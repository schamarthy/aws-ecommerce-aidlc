events {
    worker_connections 1024;
}

http {
    # Increase timeouts for slow startups
    proxy_connect_timeout 10s;
    proxy_read_timeout 60s;

    server {
        listen 80;

        # Admin API
        location /api/admin {
            proxy_pass http://admin-api:8000/admin;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Catalog API
        location /api/catalog {
            proxy_pass http://catalog-api:8001/catalog;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Cart API
        location /api/cart {
            proxy_pass http://cart-api:8002/cart;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Orders API
        location /api/orders {
            proxy_pass http://orders-api:8003/orders;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Auth API
        location /api/auth {
            proxy_pass http://auth-api:8004/auth;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Health check
        location /health {
            proxy_pass http://admin-api:8000/health;
            proxy_set_header Host $host;
        }
    }
}
