events {
    worker_connections 1024;
}

http {
    # Increase timeouts for slow startups
    proxy_connect_timeout 10s;
    proxy_read_timeout 60s;

    server {
        listen 80;

        # Admin API
        location /admin {
            proxy_pass http://admin-api:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Catalog API
        location /catalog {
            proxy_pass http://catalog-api:8001;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Cart API
        location /cart {
            proxy_pass http://cart-api:8002;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Orders API
        location /orders {
            proxy_pass http://orders-api:8003;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Auth API
        location /auth {
            proxy_pass http://auth-api:8004;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Health check
        location /health {
            proxy_pass http://admin-api:8000;
            proxy_set_header Host $host;
        }
    }
}
